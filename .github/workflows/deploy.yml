name: Deploy Project Rebuild to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build application
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          package-manager-cache: false

      - name: Display tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install --include=dev --no-audit --no-fund

      - name: Confirm Vite installation
        run: ./node_modules/.bin/vite --version

      - name: Build application
        run: npm run build

      - name: Confirm production build exists
        run: |
          echo "Production build contents:"
          find dist -maxdepth 2 -type f
          test -f dist/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload production website
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy website
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
